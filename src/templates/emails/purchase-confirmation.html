<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compra Confirmada - CodeSPACE</title>
</head>
<body style="margin:0;padding:0;background-color:#09090b;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color:#09090b;">
  <tr><td align="center" style="padding:48px 16px;">
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="560" style="max-width:560px;width:100%;">

      <!-- Logo -->
      <tr><td style="padding-bottom:32px;">
        <span style="font-size:22px;font-weight:700;color:#f4f4f5;letter-spacing:-0.5px;">code<span style="color:#3b82f6;">SPACE</span></span>
      </td></tr>

      <!-- Card -->
      <tr><td style="background:#18181b;border:1px solid #27272a;border-radius:12px;overflow:hidden;">
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
          <tr><td style="padding:32px;">

            <p style="margin:0 0 24px;font-size:15px;color:#a1a1aa;line-height:1.6;">
              Olá <strong style="color:#f4f4f5;">{{studentName}}</strong>,
            </p>
            <p style="margin:0 0 24px;font-size:15px;color:#a1a1aa;line-height:1.6;">
              Seu pagamento foi confirmado. Você agora tem acesso ao plano <strong style="color:#3b82f6;">{{planName}}</strong>.
            </p>

            <!-- Details -->
            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%"
              style="background:#0f0f12;border:1px solid #27272a;border-radius:8px;margin-bottom:24px;">
              <tr>
                <td style="padding:14px 20px;border-bottom:1px solid #27272a;">
                  <span style="font-size:12px;color:#71717a;">Plano</span><br/>
                  <span style="font-size:14px;font-weight:600;color:#f4f4f5;">{{planName}}</span>
                </td>
                <td style="padding:14px 20px;border-bottom:1px solid #27272a;" align="right">
                  <span style="font-size:12px;color:#71717a;">Ciclo</span><br/>
                  <span style="font-size:14px;color:#f4f4f5;">{{billingCycle}}</span>
                </td>
              </tr>
              <tr>
                <td style="padding:14px 20px;">
                  <span style="font-size:12px;color:#71717a;">Valor</span><br/>
                  <span style="font-size:16px;font-weight:700;color:#f4f4f5;">R$ {{amount}}</span>
                </td>
                <td style="padding:14px 20px;" align="right">
                  <span style="font-size:12px;color:#71717a;">Data</span><br/>
                  <span style="font-size:14px;color:#f4f4f5;">{{date}}</span>
                </td>
              </tr>
            </table>

            <!-- CTA -->
            <table role="presentation" cellspacing="0" cellpadding="0" border="0">
              <tr><td style="background:#3b82f6;border-radius:8px;padding:12px 28px;">
                <a href="https://www.codespace.com.br/platform" style="color:#fff;font-size:14px;font-weight:600;text-decoration:none;">Acessar Plataforma</a>
              </td></tr>
            </table>

          </td></tr>
        </table>
      </td></tr>

      <!-- Footer -->
      <tr><td style="padding:24px 0 0;text-align:center;">
        <p style="margin:0 0 6px;font-size:12px;color:#52525b;">Dúvidas? <a href="https://wa.me/5564981537871" style="color:#3b82f6;text-decoration:none;">Fale conosco</a></p>
        <p style="margin:0;font-size:11px;color:#3f3f46;">© {{year}} CodeSPACE. Todos os direitos reservados.</p>
      </td></tr>

    </table>
  </td></tr>
</table>
</body>
</html>
